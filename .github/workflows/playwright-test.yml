name: Playwright Test
on:
  workflow_call:
    inputs:
      test-script:
        description: 'npm run command'
        required: true
        type: string
      report-folder:
        description: 'Report folder'
        required: true
        type: string
    secrets:
      BASE_URL_AUTH:
        required: false
      BASE_URL_NO_AUTH:
        required: false
      BASE_URL_UI:
        required: false
      API_KEY:
        required: false

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run ${{ inputs.test-script }}
        env:
          TEST_SCRIPT: ${{ inputs.test-script }}
          BASE_URL_AUTH: ${{ secrets.BASE_URL_AUTH }}
          BASE_URL_NO_AUTH: ${{ secrets.BASE_URL_NO_AUTH }}
          BASE_URL_UI: ${{ secrets.BASE_URL_UI }}
          API_KEY: ${{ secrets.API_KEY }}
          CI: "true"
        run: |
          docker build -t pw-tests .

          mkdir -p "${{ inputs.report-folder }}"
          
          docker run --rm \
            -v $(pwd)/${{ inputs.report-folder }}:/app/playwright-report \
            -e TEST_SCRIPT \
            -e BASE_URL_AUTH \
            -e BASE_URL_NO_AUTH \
            -e BASE_URL_UI \
            -e API_KEY \
            -e CI \
            pw-tests
      
      - name: Upload ${{ inputs.report-folder }} Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.report-folder }}
          path: ${{ inputs.report-folder }}/
          retention-days: 7

      - name: Deploy Report to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report-${{ inputs.report-folder }}
          destination_dir: reports/${{ github.run_id }}/${{ inputs.report-folder }}
