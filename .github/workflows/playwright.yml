name: Playwright Tests Sequential Reports

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  oauth-test:
    uses: ./.github/workflows/playwright-test.yml
    with:
      test-script: test:api:oauth
      report-name: oauth
    secrets: inherit

  no_oauth-test:
    uses: ./.github/workflows/playwright-test.yml
    with:
      test-script: test:api:no_oauth
      report-name: no_oauth
    secrets: inherit

  # ui-test:
  #   uses: ./.github/workflows/playwright-test.yml
  #   with:
  #     test-script: test:ui
  #     report-name: ui
  #   secrets: inherit

  generate-allure-report:
    # needs: [oauth-test, no_oauth-test, ui-test]
    needs: [oauth-test, no_oauth-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install deps
        run: npm ci
      
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: all-allure-results/
          pattern: allure-results-*
          merge-multiple: true
      
      - name: Debug JSON count
        run: |
          find all-allure-results -name "*.json" | wc -l
      
      - name: Generate Allure HTML
        run: npx allure generate all-allure-results/ \
          --clean \
          --output allure-report
      
      - name: Verify report
        run: |
          ls -la allure-report/
          test -f allure-report/index.html && echo "✅ Allure ready" || exit 1
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/
