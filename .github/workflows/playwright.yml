name: Playwright Tests
on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  oauth:
    uses: ./.github/workflows/playwright-test.yml
    with:
      test-script: test:api:oauth
      report-folder: oauth
    secrets: inherit

  no_oauth:
    uses: ./.github/workflows/playwright-test.yml
    with:
      test-script: test:api:no_oauth
      report-folder: no_oauth
    secrets: inherit

  ui:
    uses: ./.github/workflows/playwright-test.yml
    with:
      test-script: test:ui
      report-folder: ui
    secrets: inherit
