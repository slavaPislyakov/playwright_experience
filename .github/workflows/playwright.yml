name: Playwright Tests
on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t pw-tests .
    
    - name: Run API tests
      env:
        BASE_URL_AUTH: ${{ secrets.BASE_URL_AUTH }}
        BASE_URL_NO_AUTH: ${{ secrets.BASE_URL_NO_AUTH }}
        API_KEY: ${{ secrets.API_KEY }}
        BASE_URL_UI: ${{ secrets.BASE_URL_UI }}
      run: |
        docker run --rm \
          -e BASE_URL_AUTH \
          -e BASE_URL_NO_AUTH \
          -e API_KEY \
          -e BASE_URL_UI \
          pw-tests:latest
    
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: |
          playwright-report/
          allure-results/
        retention-days: 30
