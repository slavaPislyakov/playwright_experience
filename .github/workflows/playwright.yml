  #   with:
  #     test-script: test:ui
  #     report-folder: ui
  #   secrets: inherit

  deploy-oauth:
    needs: [oauth]
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: playwright-report-oauth
          path: oauth-report/
      - name: Deploy OAuth Report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./oauth-report/playwright-report
          destination_dir: reports/${{ github.run_id }}/oauth
          allow_empty_commit: true
          force_orphan: true

